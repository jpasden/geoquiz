<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Ocean background -->
  <circle cx="16" cy="16" r="15" fill="#3B82F6"/>
  <!-- Globe outline -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#1E40AF" stroke-width="1"/>
  <!-- Continents (simplified land masses) -->
  <g fill="#22C55E">
    <!-- Americas -->
    <path d="M8 6 Q6 8 7 12 Q8 14 6 18 Q5 22 7 24 Q9 23 10 20 Q11 17 10 14 Q12 12 11 9 Q10 7 8 6Z"/>
    <!-- Europe/Africa -->
    <path d="M17 5 Q19 6 20 9 Q21 11 19 13 Q18 16 20 19 Q21 22 19 25 Q17 26 16 23 Q15 20 16 17 Q14 14 15 11 Q14 8 17 5Z"/>
    <!-- Asia/Australia -->
    <path d="M23 8 Q26 10 25 14 Q24 17 26 19 Q25 21 23 20 Q21 18 22 15 Q21 12 23 8Z"/>
    <ellipse cx="25" cy="24" rx="2" ry="1.5"/>
  </g>
  <!-- Latitude lines -->
  <g fill="none" stroke="#1E40AF" stroke-width="0.5" opacity="0.4">
    <ellipse cx="16" cy="8" rx="13" ry="4"/>
    <ellipse cx="16" cy="16" rx="15" ry="6"/>
    <ellipse cx="16" cy="24" rx="13" ry="4"/>
  </g>
  <!-- Longitude line -->
  <ellipse cx="16" cy="16" rx="6" ry="15" fill="none" stroke="#1E40AF" stroke-width="0.5" opacity="0.4"/>
</svg>
